
stages:
  - lint
  - build
  - sync-with-upstream

variables:
  TELEKOM_REGISTRY: "mtr.devops.telekom.de/osc/common"
  CI_LINTER_IMG: "${TELEKOM_REGISTRY}/osc-builder:v7.1.5"
  GO_BUILD_IMG: "mtr.devops.telekom.de/osc/onmetal/container-images/go:go-1.25.0-alpine-3.22.1"
  TOOLS_IMAGE: mtr.devops.telekom.de/osc/onmetal/container-images/tools:v1.0.0-alpine3.22

default:
  tags:
    - docker
    - pes
    - osc
  image:
    name: "${CI_LINTER_IMG}"
    entrypoint: ["/bin/ash", "-c"]
  retry:
    max: 2
    when:
      - runner_system_failure
      - job_execution_timeout

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' || $CI_PIPELINE_SOURCE == 'schedule'
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\..*/

# Common template to run jobs on changes in go files
.run-on-go-change:
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      changes:
          compare_to: 'osc/main'
          paths:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'

# Lint Stages for various file types
yaml-lint:
  stage: lint
  variables:
    YAML_LINT_CONFIG: './.linter-config/yamllint.yaml'
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      changes:
          compare_to: 'osc/main'
          paths:
            - "**/*.yaml"
            - "**/*.yml"
  script:
    - |
      if [[ -f "${YAML_LINT_CONFIG}" ]]; then
        cfg="-c ${YAML_LINT_CONFIG}"
      fi
      yamllint -f colored ${cfg} . && echo "Linting was successful."

file-lint:
  stage: lint
  variables:
    FILES_LINT_CONFIG: './.linter-config/file-lint.conf'
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      changes:
          compare_to: 'osc/main'
          paths:
            - "**/*" # To ensure it won't run on empty commits
  script:
    - if [[ ${PIPELINE_DEBUG} == 1 ]]; then debug_flag="-x"; fi
    - if [[ -f "${FILES_LINT_CONFIG}" ]]; then cfg="--config ${FILES_LINT_CONFIG}"; fi
    - echo "${cfg}"
    - bash ${debug_flag} file-empty ${cfg} --path .
    - bash ${debug_flag} file-cr ${cfg} --path .
    - bash ${debug_flag} file-crlf ${cfg} --path .
    - bash ${debug_flag} file-nullbyte ${cfg} --path .
    - bash ${debug_flag} file-trailing-single-newline ${cfg} --path .
    - bash ${debug_flag} file-trailing-space ${cfg} --path .
    - bash ${debug_flag} file-utf8 ${cfg} --path .
    - bash ${debug_flag} file-utf8-bom ${cfg} --path .

markdown-lint:
  stage: lint
  variables:
    MARKDOWN_LINT_CONFIG: './.linter-config/pymarkdown.yaml'
    MARKDOWN_LINT_IGNORE_CONFIG: "./.linter-config/.markdownlintignore"
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      changes:
          compare_to: 'osc/main'
          paths:
            - "**/*.md"
            - ".linter-config/pymarkdown.yaml"
  script:
    - |
      # 1. Prepare Configuration
      if [[ -f "${MARKDOWN_LINT_CONFIG}" ]]; then
        # PyMarkdown uses -c or --config
        cfg="-c ${MARKDOWN_LINT_CONFIG}"
      fi
      echo "Starting PyMarkdown Scan..."
      pymarkdown ${cfg} scan . && echo "Linting was successful."

shell-lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      changes:
          compare_to: 'osc/main'
          paths:
            - "**/*.sh"
  variables:
    SHELL_LINT_EXCLUDES: .linter-config/shellcheck-excludes
  script:
    - |
      set -euo pipefail

      # find all shell scripts
      filelist=$(find . -iname '*.sh' -type f)

      echo -e "[INFO]: Files to lint: ${filelist}"

      if [[ -f "${SHELL_LINT_EXCLUDES}" ]]; then
        # read file, remove comments, and empty lines
        # return an empty string to mask grep's return value
        excludes=$(grep -v "^#" "${SHELL_LINT_EXCLUDES}" | grep -v '^[ \t]*$')
      else
        excludes=""
      fi

      echo -e "[INFO]: Exclude list: ${excludes}"

      # filter excludes from filelist
      if [[ -z "${excludes}" ]]; then
        echo "[INFO]: No .sh files excluded."
      else
        for exclude in ${excludes}; do
          filelist=$(echo "${filelist}" | grep -v "${exclude}")
        done
      fi

      if [[ -z "${filelist}" ]]; then
        echo "[INFO]: Nothing for linting."
        exit 0
      fi

      echo -e "[INFO]: Filtered list of files: ${filelist}"

      echo "${filelist}" | xargs shellcheck --rcfile .linter-config/shellcheckrc
      echo "[INFO]: Linting was successful."

go-lint:
  extends: .run-on-go-change
  stage: lint
  script:
    - make lint

# Build Stages for volume and bucket components
build-volume:
  extends: .run-on-go-change
  stage: build
  image:
    name: "${GO_BUILD_IMG}"
    entrypoint: ["/bin/ash", "-c"]
  script:
    - make build-volume

build-bucket:
  extends: .run-on-go-change
  stage: build
  image:
    name: "${GO_BUILD_IMG}"
    entrypoint: ["/bin/ash", "-c"]
  script:
    - make build-bucket

# SYNC Stage
sync-with-upstream:
  stage: sync-with-upstream
  image:
    name: $TOOLS_IMAGE
    entrypoint: [""]
  variables:
    PYTHON_GITLAB_CFG: "$GITLAB_CFG"
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
    GITLAB_TIMEOUT: 10
  script:
    - bash ./hack/osc-sync-with-upstream.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
